<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HBS Compliance Manager v10</title>
<style>
:root{--blue:#123f6d;--blue2:#2369a7;--bg:#f4f7fb;--line:#d3dfed;--muted:#52677f;--danger:#8b1e1e;--ok:#ddf5e4;--warn:#fff1c9}
*{box-sizing:border-box}body{font-family:Arial,Helvetica,sans-serif;margin:0;background:var(--bg);color:#071b34}
header{background:linear-gradient(90deg,#123d68,#2369a7);color:#fff;padding:24px 28px}header h1{margin:0 0 8px;font-size:30px}.version{font-size:13px;opacity:.85}
.card{background:#fff;margin:14px;padding:16px;border:1px solid var(--line);border-radius:12px;box-shadow:0 1px 4px #0001}
input,select,textarea,button{font:inherit;padding:10px;border-radius:8px;border:1px solid #b8c8d8}textarea{width:100%;min-height:80px}
button{background:var(--blue);color:white;border:0;font-weight:700;cursor:pointer;margin:3px}button.secondary{background:#52677f}button.danger{background:var(--danger)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.toolbar{display:flex;flex-wrap:wrap;gap:6px;align-items:center}.hide{display:none!important}.muted{color:var(--muted);font-size:13px}
table{width:100%;border-collapse:collapse;margin-top:8px}th,td{border-bottom:1px solid #e3eaf2;text-align:left;padding:8px;vertical-align:top}th{background:#eef4fb}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}.stat{background:#fff;border:1px solid #cfe0f2;border-radius:10px;padding:14px}.stat b:last-child{font-size:20px}
.photo-thumb{max-width:160px;max-height:120px;border:1px solid #ccc;border-radius:8px;margin:4px}iframe{width:100%;height:1450px;border:1px solid #cfd8dc;border-radius:10px;background:#fff}pre{white-space:pre-wrap;background:#f7f7f7;border:1px solid #ddd;padding:10px;overflow:auto}
@media(max-width:760px){header h1{font-size:22px}.toolbar button{width:100%}}
</style>
</head>
<body>
<header>
  <h1>HBS Compliance Manager</h1>
  <div>Commercial Gas Compliance Management System</div>
  <div class="version">Development Release 1 · Version 10.0 Navigation Fix</div>
</header>

<section id="loginCard" class="card">
  <h2>Portal Login</h2>
  <div class="grid">
    <label>Email / Name<br><input id="loginEmail" value="peter@hbs.local" autocomplete="username"></label>
    <label>PIN<br><input id="loginPin" type="password" inputmode="numeric" autocomplete="current-password"></label>
  </div>
  <p><button onclick="login()">Login</button><button class="secondary" onclick="testLoginApi()">Test Login API</button></p>
  <p id="loginMsg" class="muted">Use peter@hbs.local and PIN 3110.</p>
</section>

<section id="app" class="hide">
  <div class="card"><div class="toolbar"><b id="loginStatus"></b><span id="nav"></span></div></div>
  <main>
    <section id="dashboard" class="card section hide"></section>
    <section id="conductAudit" class="card section hide"></section>
    <section id="auditHistory" class="card section hide"></section>
    <section id="training" class="card section hide"></section>
    <section id="competency" class="card section hide"></section>
    <section id="toolbox" class="card section hide"></section>
    <section id="tightness" class="card section hide"></section>
    <section id="knowledge" class="card section hide"></section>
    <section id="users" class="card section hide"></section>
    <section id="records" class="card section hide"></section>
    <section id="backup" class="card section hide"></section>
  </main>
</section>

function $(id){return document.getElementById(id)}
function safe(v){return v==null?'':String(v)}

function roleLabel(r){return r==='manager'?'Manager':r==='senior_engineer'?'Senior Engineer':'Engineer'}
function isManager(){return user&&user.role==='manager'}
function isSenior(){return user&&user.role==='senior_engineer'}
function isEngineerName(n){return !!n&&!NON_ENGINEERS.map(x=>x.toLowerCase()).includes(String(n).toLowerCase())}
function setHtml(id,html){$ (id).innerHTML=html}
function show(id){SECTIONS.forEach(s=>$(s).classList.add('hide'));$(id).classList.remove('hide')}
async function api(url,opts){const r=await fetch(url,opts||{cache:'no-store'});const t=await r.text();let j;try{j=JSON.parse(t)}catch(e){throw new Error('Non JSON response: '+t.slice(0,300))}if(!r.ok||j.ok===false)throw new Error(j.error||('HTTP '+r.status));return j}
async function testLoginApi(){try{const j=await api('/api/login?user=peter@hbs.local&pin=3110');$('loginMsg').textContent='API OK: '+j.user.name+' / '+j.user.role}catch(e){$('loginMsg').textContent=e.message}}
async function login(){try{const l=$('loginEmail').value.trim(),p=$('loginPin').value.trim();if(!l||!p){$('loginMsg').textContent='Enter email/name and PIN.';return}const j=await api('/api/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({email:l,username:l,pin:p,password:p})});user=j.user;startApp()}catch(e){$('loginMsg').textContent=e.message}}
function logout(){user=null;$('app').classList.add('hide');$('loginCard').classList.remove('hide');$('loginPin').value=''}
function startApp(){$('loginCard').classList.add('hide');$('app').classList.remove('hide');$('loginStatus').textContent='Logged in: '+user.name+' ('+roleLabel(user.role)+')';buildNav();if(isManager()){show('dashboard');loadDashboard()}else{show('auditHistory');loadAuditHistory()}}
function buildNav(){
 const base=[
 ['Dashboard','dashboard',loadDashboard],
 ['Conduct Audit','conductAudit',loadConductAudit],
 ['Audit History','auditHistory',loadAuditHistory],
 ['Training Centre','training',loadTraining],
 ['Competency Centre','competency',loadCompetency],
 ['Toolbox Tests','toolbox',loadToolbox],
 ['Tightness Test Centre','tightness',loadTightness],
 ['Knowledge Centre','knowledge',loadKnowledge],
 ['Users','users',loadUsers],
 ['Record Management','records',loadRecords],
 ['Backup','backup',loadBackup],
 ['Logout','logout',logout]
 ];
 $('nav').innerHTML='';
 base.forEach(([label,id,fn])=>{
   if((id==='users'||id==='records'||id==='backup'||id==='dashboard'||id==='competency') && !isManager()) return;
   if(id==='conductAudit' && !(isManager()||isSenior())) return;
   const b=document.createElement('button');
   b.textContent=label;
   b.onclick=()=>{if(id==='logout')fn();else{show(id);fn()}};
   $('nav').appendChild(b);
 });
}

 try{const j=await api('/api/dashboard');const s=j.summary||{};$('stTotal').textContent=s.total_audits||0;$('stAvg').textContent=(s.average_score||0)+'%';$('stPassRate').textContent=(s.pass_rate||0)+'%';$('stExcellent').textContent=s.excellent||0;$('stPass').textContent=s.pass||0;$('stImprovement').textContent=s.improvement||0;$('stFail').textContent=s.fail||0;$('stOpen').textContent=(s.open_training||0)+' / '+(s.open_reaudits||0);$('leagueRows').innerHTML=(j.league||[]).filter(r=>isEngineerName(r.engineer)).map((r,i)=>'<tr><td>'+(i+1)+'</td><td>'+safe(r.engineer)+'</td><td>'+safe(r.audits)+'</td><td>'+safe(r.avg_score)+'%</td><td>'+safe(r.excellent)+'</td><td>'+safe(r.improvement)+'</td><td>'+safe(r.fails)+'</td></tr>').join('');$('auditRows').innerHTML=(j.audits||[]).map(a=>'<tr><td>'+safe(a.ref)+'</td><td>'+safe(a.date)+'</td><td>'+safe(a.engineer)+'</td><td>'+safe(a.site)+'</td><td>'+safe(a.manufacturer)+'</td><td>'+safe(a.model)+'</td><td>'+safe(a.score)+'</td><td>'+safe(a.result)+'</td><td><button onclick="openAuditFromDashboard(\''+safe(a.id||String(a.ref).replace('HBS-',''))+'\')">Review</button></td></tr>').join('')}catch(e){$('dashMsg').textContent=e.message}}
async function openAuditFromDashboard(id){show('auditHistory');await loadAuditHistory();viewAuditDetail(id)}

async function loadConductAudit(){
 setHtml('conductAudit','<h2>Conduct Audit</h2><div class="grid"><label>Engineer<br><select id="aEngineer"></select></label><label>Site Name<br><input id="aSite"></label><label>Client<br><input id="aClient"></label><label>Audit Date<br><input id="aDate" type="date"></label><label>Auditor<br><input id="aAuditor"></label><label>Manufacturer<br><select id="aManufacturer">'+MANUFACTURERS.map(m=>'<option>'+m+'</option>').join('')+'</select></label><label>Model<br><input id="aModel"></label><label>Serial Number<br><input id="aSerial"></label><label>Asset Number<br><input id="aAsset"></label></div><h3>Audit Questions</h3><table><thead><tr><th>Section</th><th>Question</th><th>Score</th><th>Notes / Findings</th></tr></thead><tbody id="qRows"></tbody></table><h3>Combustion / Safety Readings</h3><div class="grid"><label>CO ppm<br><input id="co"></label><label>CO2 %<br><input id="co2"></label><label>O2 %<br><input id="o2"></label><label>Flue Temp °C<br><input id="flue"></label><label>Efficiency %<br><input id="eff"></label><label>Ratio<br><input id="ratio"></label><label>Inlet Pressure mbar<br><input id="inlet"></label></div><label>Findings / Actions<br><textarea id="aFindings"></textarea></label><label>Training / Re-audit<br><textarea id="aTraining">Post-audit refresher training / toolbox talk required. Re-audit to be completed within 30 days.</textarea></label><div class="statgrid"><div class="stat"><b>Score</b><br><b id="scoreOut">0%</b></div><div class="stat"><b>Result</b><br><b id="resultOut">Awaiting completion</b></div></div><p><button onclick="saveAudit()">Save Audit</button></p><p id="auditMsg" class="muted"></p>');
 await loadEngineersInto(['aEngineer']);$('aDate').value=new Date().toISOString().slice(0,10);$('aAuditor').value=user.name;$('qRows').innerHTML=AUDIT_QUESTIONS.map(([sec,q],i)=>'<tr><td>'+sec+'</td><td>'+q+'</td><td><select class="qScore" onchange="calcScore()"><option value="">Select</option><option>10</option><option>5</option><option>0</option><option>na</option></select></td><td><input class="qNote"></td></tr>').join('');calcScore()
}
function calcScore(){const s=[...document.querySelectorAll('.qScore')].filter(x=>x.value&&x.value!=='na');const total=s.reduce((a,x)=>a+Number(x.value||0),0);const score=s.length?Math.round(total/(s.length*10)*100):0;const result=score>=95?'Excellent':score>=85?'Pass':score>=75?'Improvement Required':s.length?'Fail':'Awaiting completion';$('scoreOut').textContent=score+'%';$('resultOut').textContent=result;return {score,result}}
async function saveAudit(){try{const c=calcScore();const questions=[...document.querySelectorAll('#qRows tr')].map((tr,i)=>({section:AUDIT_QUESTIONS[i][0],question:AUDIT_QUESTIONS[i][1],score:tr.querySelector('.qScore').value,notes:tr.querySelector('.qNote').value,response:tr.querySelector('.qScore').value,finding:tr.querySelector('.qNote').value}));const body={role:user.role,engineer_name:$('aEngineer').value,site_name:$('aSite').value,client:$('aClient').value,audit_date:$('aDate').value,auditor:$('aAuditor').value,manufacturer:$('aManufacturer').value,model:$('aModel').value,serial_number:$('aSerial').value,asset_number:$('aAsset').value,score:c.score,result:c.result,findings:$('aFindings').value,training_required:$('aTraining').value,combustion:{co:$('co').value,co2:$('co2').value,o2:$('o2').value,flue_temp:$('flue').value,efficiency:$('eff').value,ratio:$('ratio').value,inlet_pressure:$('inlet').value},questions};const j=await api('/api/audits',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});$('auditMsg').textContent='Saved '+j.ref}catch(e){$('auditMsg').textContent=e.message}}

async function loadAuditHistory(){
 setHtml('auditHistory','<h2>Audit History</h2><p><button onclick="loadAuditHistory()">Refresh</button></p><table><thead><tr><th>Ref</th><th>Date</th><th>Engineer</th><th>Site</th><th>Score</th><th>Result</th><th>Action</th></tr></thead><tbody id="histRows"></tbody></table><h3>Selected Audit Detail</h3><div id="auditDetail">Select an audit.</div>');
 try{const j=await api('/api/audits?role='+user.role+'&engineer='+encodeURIComponent(user.name));window._audits=j.audits||[];$('histRows').innerHTML=window._audits.map(a=>'<tr><td>'+safe(a.ref||'HBS-'+a.id)+'</td><td>'+safe(a.audit_date||a.created_at)+'</td><td>'+safe(a.engineer_name)+'</td><td>'+safe(a.site_name)+'</td><td>'+safe(a.score)+'</td><td>'+safe(a.result)+'</td><td><button onclick="viewAuditDetail('+a.id+')">Review</button></td></tr>').join('')}catch(e){$('histRows').innerHTML='<tr><td colspan=7>'+e.message+'</td></tr>'}}
async function viewAuditDetail(id){try{let a=(window._audits||[]).find(x=>Number(x.id)===Number(id));let photos=[];try{const full=await api('/api/audit?id='+id);if(full.audit)a={...a,...full.audit};photos=full.photos||[]}catch(e){}let d={};try{d=JSON.parse(a.audit_json||'{}')}catch(e){}const qs=d.questions||d.auditQuestions||[];const comb=d.combustion||{};const photoHtml=photos.length?photos.map(p=>'<a href="'+p.photo_url+'" target="_blank"><img class="photo-thumb" src="'+p.photo_url+'"></a>').join(''):'No photos attached.';$('auditDetail').innerHTML='<table><tr><th>Ref</th><td>'+safe(a.ref||'HBS-'+a.id)+'</td></tr><tr><th>Engineer</th><td>'+safe(a.engineer_name)+'</td></tr><tr><th>Site</th><td>'+safe(a.site_name)+'</td></tr><tr><th>Client</th><td>'+safe(a.client||d.client)+'</td></tr><tr><th>Auditor</th><td>'+safe(a.auditor||d.auditor)+'</td></tr><tr><th>Manufacturer / Model</th><td>'+safe(a.manufacturer)+' '+safe(a.model)+'</td></tr><tr><th>Score / Result</th><td>'+safe(a.score)+'% - '+safe(a.result)+'</td></tr><tr><th>Findings</th><td>'+safe(a.findings||d.findings)+'</td></tr><tr><th>Training / Re-audit</th><td>'+safe(a.training_required||d.training_required)+'</td></tr></table><h4>Combustion</h4><table><tr><th>CO ppm</th><td>'+safe(comb.co)+'</td><th>CO2 %</th><td>'+safe(comb.co2)+'</td></tr><tr><th>O2 %</th><td>'+safe(comb.o2)+'</td><th>Flue Temp</th><td>'+safe(comb.flue_temp)+'</td></tr><tr><th>Efficiency</th><td>'+safe(comb.efficiency)+'</td><th>Ratio</th><td>'+safe(comb.ratio)+'</td></tr></table><h4>Audit Questions</h4><table><thead><tr><th>Section</th><th>Question</th><th>Score / Response</th><th>Notes / Finding</th></tr></thead><tbody>'+(qs.length?qs.map(q=>'<tr><td>'+safe(q.section)+'</td><td>'+safe(q.question)+'</td><td>'+safe(q.score||q.response)+'</td><td>'+safe(q.notes||q.finding)+'</td></tr>').join(''):'<tr><td colspan=4>No detailed question data stored.</td></tr>')+'</tbody></table><h4>Photos</h4>'+photoHtml+'<p><button class="secondary" onclick="document.getElementById(\'rawJson\').classList.toggle(\'hide\')">Show Raw Audit JSON</button></p><pre id="rawJson" class="hide">'+htmlSafe(JSON.stringify(d,null,2))+'</pre>'}catch(e){$('auditDetail').textContent=e.message}}

async function loadTraining(){setHtml('training','<h2>Training Centre</h2><p><button onclick="loadTraining()">Refresh</button></p><table><thead><tr><th>ID</th><th>Engineer</th><th>Training</th><th>Assigned</th><th>Status</th><th>Completion</th><th>Action</th></tr></thead><tbody id="trRows"></tbody></table><h3>Open Re-audits</h3><table><thead><tr><th>Audit</th><th>Engineer</th><th>Due</th><th>Status</th></tr></thead><tbody id="reaRows"></tbody></table>');const [t,r]=await Promise.all([api('/api/training?role='+user.role+'&engineer='+encodeURIComponent(user.name)).catch(e=>({training:[]})),api('/api/reaudits?role='+user.role+'&engineer='+encodeURIComponent(user.name)).catch(e=>({reaudits:[]}))]);$('trRows').innerHTML=(t.training||[]).map(x=>'<tr><td>'+safe(x.id)+'</td><td>'+safe(x.engineer_name)+'</td><td>'+safe(x.training_type)+'</td><td>'+safe(x.assigned_date)+'</td><td>'+safe(x.status)+'</td><td>'+safe(x.completion_date)+'</td><td>'+(isManager()?'<button onclick="completeTraining('+x.id+')">Complete</button>':'')+'</td></tr>').join('');$('reaRows').innerHTML=(r.reaudits||[]).map(x=>'<tr><td>'+safe(x.audit_ref)+'</td><td>'+safe(x.engineer_name)+'</td><td>'+safe(x.due_date)+'</td><td>'+safe(x.status)+'</td></tr>').join('')}

async function loadTightness(){setHtml('tightness','<h2>Tightness Test Centre</h2><p><button onclick="openCalc()">Open Calculator</button><button onclick="loadTightnessRecords()">Refresh Records</button></p><iframe id="calcFrame"></iframe><h3>Saved Tightness Records</h3><table><thead><tr><th>ID</th><th>Date</th><th>Engineer</th><th>Site</th><th>Volume</th><th>Drop</th><th>Result</th></tr></thead><tbody id="ttRows"></tbody></table>');openCalc();loadTightnessRecords()}
function openCalc(){if(!CALC_B64){$('calcFrame').srcdoc='<h2>Tightness calculator source missing in this release.</h2>';return}const bin=atob(CALC_B64);const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);$('calcFrame').srcdoc=new TextDecoder().decode(bytes)}
async function loadTightnessRecords(){const j=await api('/api/tightness?role='+user.role+'&engineer='+encodeURIComponent(user.name));$('ttRows').innerHTML=(j.records||[]).map(r=>'<tr><td>'+safe(r.id)+'</td><td>'+safe(r.test_date)+'</td><td>'+safe(r.engineer_name)+'</td><td>'+safe(r.site_name)+'</td><td>'+safe(r.installation_volume)+'</td><td>'+safe(r.measured_drop)+'</td><td>'+safe(r.outcome)+'</td></tr>').join('')}

async function loadKnowledge(){setHtml('knowledge','<h2>Knowledge Centre</h2><div class="toolbar"><button onclick="setKC(\'\')">All Documents</button><button onclick="setKC(\'IGEM Standards\')">IGEM Standards</button><button onclick="setKC(\'Manufacturer Manuals\')">Manufacturer Manuals</button><button onclick="setKC(\'Gas Safe Guidance\')">Gas Safe Guidance</button><button onclick="setKC(\'Gas Installer Magazine\')">Gas Installer Magazine</button></div><h3>Manufacturers</h3><div class="toolbar">'+MANUFACTURERS.map(m=>'<button class="secondary" onclick="kcMan(\''+m.replace(/'/g,"\\'")+'\')">'+m+'</button>').join('')+'</div><div class="grid"><label>Search<br><input id="kcQ"></label><label>Category<br><select id="kcCat"><option value="">All Categories</option><option>IGEM Standards</option><option>Manufacturer Manuals</option><option>HBS Bulletins</option><option>Gas Safe Guidance</option><option>Gas Installer Magazine</option></select></label></div><p><button onclick="loadKnowledgeRows()">Search</button></p><p id="kcMsg" class="muted"></p><table><thead><tr><th>Title</th><th>Category</th><th>Reference</th><th>Keywords</th><th>Uploaded</th><th>Action</th></tr></thead><tbody id="kcRows"></tbody></table>');loadKnowledgeRows()}

async function loadRecords(){setHtml('records','<h2>Record Management</h2><p class="muted">Delete old/test records. Take a backup first.</p><div class="grid"><label>Record Type<br><select id="delType"><option value="audit">Audit</option><option value="training">Training</option><option value="reaudit">Re-audit</option><option value="toolbox">Toolbox/Test Result</option><option value="tightness">Tightness Test</option></select></label><label>Record ID<br><input id="delId"></label></div><p><button class="danger" onclick="deleteRecord()">Delete Selected Record</button></p><p id="delMsg" class="muted"></p>')}
async function deleteRecord(){if(!confirm('Delete selected record?'))return;const j=await api('/api/admin-delete',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({role:user.role,type:$('delType').value,id:$('delId').value,manager:user.name})});$('delMsg').textContent=j.message||'Deleted'}
async function loadBackup(){setHtml('backup','<h2>Backup</h2><p><button onclick="downloadBackup()">Download JSON Backup</button></p><pre id="backupOut"></pre>')}
async function downloadBackup(){const j=await api('/api/backup');const text=JSON.stringify(j.backup||j,null,2);$('backupOut').textContent=text.slice(0,5000);const blob=new Blob([text],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='hbs-compliance-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click()}

function ensureFullNavigation(){
  if(!user || !$('nav')) return;
  const existing = $('nav').textContent || '';
  if(existing.includes('Knowledge Centre') && existing.includes('Tightness Test Centre')) return;
  buildNav();
}
setTimeout(ensureFullNavigation, 500);
setTimeout(ensureFullNavigation, 1500);
