<html lang="en">
<head>
<meta charset="utf-8">

<title>HBS Compliance Manager Recovery</title>
<style>
:root{--blue:#123f6d;--blue2:#2369a7;--bg:#f4f7fb;--line:#d3dfed;--muted:#52677f;--danger:#8b1e1e}
*{box-sizing:border-box}body{font-family:Arial,Helvetica,sans-serif;margin:0;background:var(--bg);color:#071b34}
.top{background:linear-gradient(90deg,#123d68,#2369a7);color:#fff;padding:24px 28px}.top h1{margin:0 0 8px;font-size:30px}.version{font-size:13px;opacity:.85}
.card{background:#fff;margin:14px;padding:16px;border:1px solid var(--line);border-radius:12px;box-shadow:0 1px 4px #0001}
input,select,textarea,button{font:inherit;padding:10px;border-radius:8px;border:1px solid #b8c8d8}
button{background:var(--blue);color:#fff;border:0;font-weight:700;cursor:pointer;margin:3px}button.secondary{background:#52677f}button.danger{background:var(--danger)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.hide{display:none!important}.muted{color:var(--muted);font-size:13px}
.toolbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center}table{width:100%;border-collapse:collapse;margin-top:8px}th,td{border-bottom:1px solid #e3eaf2;text-align:left;padding:8px;vertical-align:top}th{background:#eef4fb}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}.stat{background:#fff;border:1px solid #cfe0f2;border-radius:10px;padding:14px}
.photo-thumb{max-width:160px;max-height:120px;border:1px solid #ccc;border-radius:8px;margin:4px}textarea{width:100%;min-height:80px}iframe{width:100%;height:1400px;border:1px solid #cfd8dc;border-radius:10px;background:#fff}
pre{white-space:pre-wrap;background:#f7f7f7;padding:10px;border:1px solid #ddd;overflow:auto}
</style>
</head>

<header class="top"><h1>HBS Compliance Manager</h1><div>Commercial Gas Compliance Management System</div><div class="version">Recovery single-file build</div></header>

<section id="loginCard" class="card">
<h2>Portal Login</h2>
<div class="grid">
<label>Email / Name<br><input id="loginEmail" value="peter@hbs.local"></label>
<label>PIN<br><input id="loginPin" type="password" inputmode="numeric"></label>
</div>
<p><button onclick="login()">Login</button><button class="secondary" onclick="testLoginApi()">Test Login API</button></p>
<p id="loginMsg" class="muted">Use peter@hbs.local and PIN 3110.</p>
</section>

<section id="app" class="hide">
<div class="card"><div class="toolbar"><b id="loginStatus"></b><span id="navButtons"></span></div></div>
<main>
<section id="dashboard" class="card section hide"></section>
<section id="auditForm" class="card section hide"></section>
<section id="auditHistory" class="card section hide"></section>
<section id="training" class="card section hide"></section>
<section id="competency" class="card section hide"></section>
<section id="toolbox" class="card section hide"></section>
<section id="tightness" class="card section hide"></section>
<section id="knowledge" class="card section hide"></section>
<section id="users" class="card section hide"></section>
<section id="records" class="card section hide"></section>
</main>
</section>

function $(id){return document.getElementById(id)}
function safe(v){return v==null?'':String(v)}
function roleLabel(r){return r==='manager'?'Manager':r==='senior_engineer'?'Senior Engineer':'Engineer'}

async function api(url,opts){const r=await fetch(url,opts||{cache:'no-store'});const t=await r.text();let j;try{j=JSON.parse(t)}catch(e){throw new Error('Non JSON response: '+t.slice(0,200))}if(!r.ok||j.ok===false)throw new Error(j.error||('HTTP '+r.status));return j}
async function testLoginApi(){try{const j=await api('/api/login?user=peter@hbs.local&pin=3110');$('loginMsg').textContent='API OK: '+j.user.name+' / '+j.user.role}catch(e){$('loginMsg').textContent=e.message}}
async function login(){try{const l=$('loginEmail').value.trim(),p=$('loginPin').value.trim();if(!l||!p){$('loginMsg').textContent='Enter email/name and PIN.';return}const j=await api('/api/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({email:l,username:l,pin:p,password:p})});user=j.user;startApp()}catch(e){$('loginMsg').textContent=e.message}}
function logout(){user=null;$('app').classList.add('hide');$('loginCard').classList.remove('hide');$('loginPin').value=''}
function startApp(){$('loginCard').classList.add('hide');$('app').classList.remove('hide');$('loginStatus').textContent='Logged in: '+user.name+' ('+roleLabel(user.role)+')';buildNav();if(user.role==='manager'){show('dashboard');loadDashboard()}else{show('auditHistory');loadAuditHistory()}}
function buildNav(){
 const menus={manager:[['Dashboard','dashboard',loadDashboard],['Conduct Audit','auditForm',loadAuditForm],['Audit History','auditHistory',loadAuditHistory],['Training Centre','training',loadTraining],['Competency Centre','competency',loadCompetency],['Toolbox Tests','toolbox',loadToolbox],['Tightness Test Centre','tightness',loadTightness],['Knowledge Centre','knowledge',loadKnowledge],['Users','users',loadUsers],['Record Management','records',loadRecords],['Logout','logout',logout]],senior_engineer:[['Conduct Audit','auditForm',loadAuditForm],['Audit History','auditHistory',loadAuditHistory],['Tightness Test Centre','tightness',loadTightness],['Knowledge Centre','knowledge',loadKnowledge],['Logout','logout',logout]],engineer:[['My Records','auditHistory',loadAuditHistory],['Training','training',loadTraining],['Tightness Test Centre','tightness',loadTightness],['Knowledge Centre','knowledge',loadKnowledge],['Logout','logout',logout]]};
 $('navButtons').innerHTML='';
 (menus[user.role]||menus.engineer).forEach(([label,id,fn])=>{let b=document.createElement('button');b.textContent=label;b.onclick=()=>{if(id==='logout')fn();else{show(id);fn()}};$('navButtons').appendChild(b)})
}

async function loadDashboard(){
 setHtml('dashboard','<h2>Dashboard</h2><p><button onclick="loadDashboard()">Refresh</button></p><div class="statgrid"><div class="stat"><b>Total Audits</b><br><b id="stTotal">0</b></div><div class="stat"><b>Average Score</b><br><b id="stAvg">0%</b></div><div class="stat"><b>Pass Rate</b><br><b id="stPassRate">0%</b></div><div class="stat"><b>Fail</b><br><b id="stFail">0</b></div></div><h3>Engineer League Table</h3><table><thead><tr><th>Rank</th><th>Engineer</th><th>Audits</th><th>Avg Score</th><th>Fails</th></tr></thead><tbody id="leagueRows"></tbody></table><h3>Audit Register</h3><table><thead><tr><th>Ref</th><th>Date</th><th>Engineer</th><th>Site</th><th>Score</th><th>Result</th><th>Action</th></tr></thead><tbody id="auditRows"></tbody></table><p id="dashMsg" class="muted"></p>');
 try{const j=await api('/api/dashboard');const s=j.summary||{};$('stTotal').textContent=s.total_audits||0;$('stAvg').textContent=(s.average_score||0)+'%';$('stPassRate').textContent=(s.pass_rate||0)+'%';$('stFail').textContent=s.fail||0;$('leagueRows').innerHTML=(j.league||[]).filter(r=>isEngineerName(r.engineer)).map((r,i)=>'<tr><td>'+(i+1)+'</td><td>'+safe(r.engineer)+'</td><td>'+safe(r.audits)+'</td><td>'+safe(r.avg_score)+'%</td><td>'+safe(r.fails)+'</td></tr>').join('');$('auditRows').innerHTML=(j.audits||[]).map(a=>'<tr><td>'+safe(a.ref)+'</td><td>'+safe(a.date)+'</td><td>'+safe(a.engineer)+'</td><td>'+safe(a.site)+'</td><td>'+safe(a.score)+'</td><td>'+safe(a.result)+'</td><td><button onclick="openAuditFromDashboard(\''+safe(a.id||String(a.ref).replace('HBS-',''))+'\')">Review</button></td></tr>').join('')}catch(e){$('dashMsg').textContent=e.message}}
async function openAuditFromDashboard(id){show('auditHistory');await loadAuditHistory();viewAuditDetail(id)}

const AUDIT_QUESTIONS=['Correct job/site risk assessment completed before work started','Gas isolation and emergency controls confirmed','Ventilation checked and suitable','Gas tightness / let-by requirements considered','Flue route, termination and condition checked','Gas pressures recorded correctly','Combustion analysis completed and values acceptable','Gas rate / burner input checked where required','Condensate, safety devices and interlocks checked','Manufacturer instructions followed','Service/audit records completed correctly','Defects classified correctly: ID / AR / NCS','Client recommendations and warning notices recorded','Photographic evidence taken where appropriate','Work area left safe and operational status confirmed'];
const MANUFACTURERS=['ACV','Adveco','Andrews','AO Smith','Atag','Baxi','Buderus','Carrier','De Dietrich','Elco','Ferroli','Hamworthy','Hoval','Ideal','Intergas','Keston','Lochinvar','MHS','Nu-Way','Potterton','Powrmatic','Remeha','Riello','Robur','Stokvis','Strebel','Vaillant','Viessmann','Worcester Bosch','Wolf','Other'];
async function loadEngineersInto(ids){const j=await api('/api/users');const eng=(j.users||[]).filter(u=>isEngineerName(u.name));ids.forEach(id=>{if($(id))$(id).innerHTML=eng.map(u=>'<option>'+u.name+'</option>').join('')})}
async function loadAuditForm(){
 setHtml('auditForm','<h2>Conduct Audit</h2><div class="grid"><label>Engineer<br><select id="aEngineer"></select></label><label>Site Name<br><input id="aSite"></label><label>Client<br><input id="aClient"></label><label>Audit Date<br><input id="aDate" type="date"></label><label>Auditor<br><input id="aAuditor"></label><label>Manufacturer<br><select id="aManufacturer">'+MANUFACTURERS.map(m=>'<option>'+m+'</option>').join('')+'</select></label><label>Model<br><input id="aModel"></label></div><h3>Questions</h3><table><thead><tr><th>No</th><th>Question</th><th>Response</th><th>Finding</th></tr></thead><tbody id="auditQuestionRows"></tbody></table><h3>Combustion</h3><div class="grid"><label>CO ppm<br><input id="aCO"></label><label>CO2 %<br><input id="aCO2"></label><label>O2 %<br><input id="aO2"></label><label>Flue Temp °C<br><input id="aFlueTemp"></label><label>Efficiency %<br><input id="aEfficiency"></label><label>Ratio<br><input id="aRatio"></label><label>Inlet Pressure mbar<br><input id="aInletPressure"></label></div><div class="grid"><label>Classification<br><select id="aClassification"><option>No Defect</option><option>NCS</option><option>AR</option><option>ID</option></select></label><label>Training Required<br><select id="aTrainingRequired"><option>No</option><option>Post-audit refresher training / toolbox talk required. Re-audit to be completed within 30 days.</option></select></label></div><label>Findings<br><textarea id="aFindings"></textarea></label><div class="statgrid"><div class="stat"><b>Score</b><br><b id="aScoreOut">0%</b></div><div class="stat"><b>Result</b><br><b id="aResultOut">Awaiting completion</b></div></div><p><button onclick="saveAudit()">Save Audit</button></p><p id="auditMsg" class="muted"></p>');
 await loadEngineersInto(['aEngineer']);$('aDate').value=new Date().toISOString().slice(0,10);$('aAuditor').value=user.name;$('auditQuestionRows').innerHTML=AUDIT_QUESTIONS.map((q,i)=>'<tr><td>'+(i+1)+'</td><td>'+q+'</td><td><select class="auditResp" onchange="calculateAuditScore()"><option value="">Select</option><option value="pass">Pass</option><option value="fail">Fail</option><option value="na">N/A</option></select></td><td><input class="auditFinding"></td></tr>').join('');calculateAuditScore()
}
function calculateAuditScore(){const resp=[...document.querySelectorAll('.auditResp')];const app=resp.filter(x=>x.value&&x.value!=='na');const pass=app.filter(x=>x.value==='pass').length;const score=app.length?Math.round(pass/app.length*100):0;const result=score>=95?'Excellent':score>=85?'Pass':score>=75?'Improvement Required':app.length?'Fail':'Awaiting completion';$('aScoreOut').textContent=score+'%';$('aResultOut').textContent=result;return {score,result}}
async function saveAudit(){try{const c=calculateAuditScore();const body={role:user.role,engineer_name:$('aEngineer').value,site_name:$('aSite').value,client:$('aClient').value,audit_date:$('aDate').value,auditor:$('aAuditor').value,manufacturer:$('aManufacturer').value,model:$('aModel').value,classification:$('aClassification').value,training_required:$('aTrainingRequired').value,findings:$('aFindings').value,score:c.score,result:c.result,combustion:{co:$('aCO').value,co2:$('aCO2').value,o2:$('aO2').value,flue_temp:$('aFlueTemp').value,efficiency:$('aEfficiency').value,ratio:$('aRatio').value,inlet_pressure:$('aInletPressure').value},questions:[...document.querySelectorAll('#auditQuestionRows tr')].map((tr,i)=>({no:i+1,question:AUDIT_QUESTIONS[i],response:tr.querySelector('.auditResp').value,finding:tr.querySelector('.auditFinding').value}))};const j=await api('/api/audits',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)});$('auditMsg').textContent='Saved '+j.ref}catch(e){$('auditMsg').textContent=e.message}}

async function loadAuditHistory(){
 setHtml('auditHistory','<h2>Audit History</h2><p><button onclick="loadAuditHistory()">Refresh</button></p><table><thead><tr><th>Ref</th><th>Date</th><th>Engineer</th><th>Site</th><th>Score</th><th>Result</th><th>Action</th></tr></thead><tbody id="auditHistoryRows"></tbody></table><h3>Selected Audit Detail</h3><div id="auditDetail">Select an audit.</div>');
 try{const j=await api('/api/audits?role='+user.role+'&engineer='+encodeURIComponent(user.name));window._auditHistory=j.audits||[];$('auditHistoryRows').innerHTML=window._auditHistory.map(a=>'<tr><td>'+safe(a.ref||'HBS-'+a.id)+'</td><td>'+safe(a.audit_date||a.created_at)+'</td><td>'+safe(a.engineer_name)+'</td><td>'+safe(a.site_name)+'</td><td>'+safe(a.score)+'</td><td>'+safe(a.result)+'</td><td><button onclick="viewAuditDetail('+a.id+')">Review</button></td></tr>').join('')}catch(e){$('auditHistoryRows').innerHTML='<tr><td colspan=7>'+e.message+'</td></tr>'}}
function firstNonEmpty(){for(let i=0;i<arguments.length;i++){if(arguments[i]!==undefined&&arguments[i]!==null&&String(arguments[i]).trim()!=='')return arguments[i]}return ''}
async function viewAuditDetail(id){try{let a=(window._auditHistory||[]).find(x=>Number(x.id)===Number(id));let photos=[];try{const full=await api('/api/audit?id='+id);if(full.audit)a={...a,...full.audit};photos=full.photos||[]}catch(e){}let d={};try{d=JSON.parse(a.audit_json||'{}')}catch(e){}const combustion=d.combustion||{};const questions=d.questions||[];const photoHtml=photos.length?photos.map(p=>'<a href="'+p.photo_url+'" target="_blank"><img class="photo-thumb" src="'+p.photo_url+'"></a>').join(''):'No photos.';$('auditDetail').innerHTML='<table><tr><th>Ref</th><td>'+safe(a.ref||'HBS-'+a.id)+'</td></tr><tr><th>Engineer</th><td>'+safe(a.engineer_name)+'</td></tr><tr><th>Site</th><td>'+safe(a.site_name)+'</td></tr><tr><th>Client</th><td>'+safe(a.client||d.client)+'</td></tr><tr><th>Auditor</th><td>'+safe(a.auditor||d.auditor)+'</td></tr><tr><th>Manufacturer / Model</th><td>'+safe(a.manufacturer)+' '+safe(a.model)+'</td></tr><tr><th>Score / Result</th><td>'+safe(a.score)+'% - '+safe(a.result)+'</td></tr><tr><th>Training Required</th><td>'+safe(a.training_required||d.training_required)+'</td></tr><tr><th>Findings</th><td>'+safe(a.findings||d.findings)+'</td></tr></table><h4>Combustion / Safety Readings</h4><table><tr><th>CO ppm</th><td>'+safe(combustion.co)+'</td><th>CO2 %</th><td>'+safe(combustion.co2)+'</td></tr><tr><th>O2 %</th><td>'+safe(combustion.o2)+'</td><th>Flue Temp</th><td>'+safe(combustion.flue_temp)+'</td></tr><tr><th>Efficiency</th><td>'+safe(combustion.efficiency)+'</td><th>Ratio</th><td>'+safe(combustion.ratio)+'</td></tr></table><h4>Photographs</h4>'+photoHtml+'<h4>Question Results</h4><table><thead><tr><th>No</th><th>Question</th><th>Response</th><th>Finding</th></tr></thead><tbody>'+(questions.length?questions.map((q,i)=>'<tr><td>'+safe(q.no||i+1)+'</td><td>'+safe(q.question)+'</td><td>'+safe(q.response)+'</td><td>'+safe(q.finding)+'</td></tr>').join(''):'<tr><td colspan=4>No detailed question responses stored.</td></tr>')+'</tbody></table><p><button class="secondary" onclick="document.getElementById(\'rawJson\').classList.toggle(\'hide\')">Show raw stored audit data</button></p><pre id="rawJson" class="hide">'+JSON.stringify(d,null,2).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))+'</pre>'}catch(e){$('auditDetail').textContent=e.message}}

async function loadTraining(){setHtml('training','<h2>Training Centre</h2><p><button onclick="loadTraining()">Refresh</button></p><table><thead><tr><th>ID</th><th>Engineer</th><th>Training</th><th>Status</th></tr></thead><tbody id="trRows"></tbody></table>');const j=await api('/api/training?role='+user.role+'&engineer='+encodeURIComponent(user.name));$('trRows').innerHTML=(j.training||[]).map(x=>'<tr><td>'+safe(x.id)+'</td><td>'+safe(x.engineer_name)+'</td><td>'+safe(x.training_type)+'</td><td>'+safe(x.status)+'</td></tr>').join('')}
async function loadCompetency(){setHtml('competency','<h2>Competency Centre</h2><table><thead><tr><th>Engineer</th><th>Audits</th><th>Average</th><th>Status</th></tr></thead><tbody id="compRows"></tbody></table>');const j=await api('/api/competency');$('compRows').innerHTML=(j.engineers||[]).filter(e=>isEngineerName(e.engineer)).map(e=>'<tr><td>'+e.engineer+'</td><td>'+e.audits+'</td><td>'+e.average_score+'%</td><td>'+e.status+'</td></tr>').join('')}
async function loadToolbox(){setHtml('toolbox','<h2>Toolbox Tests</h2><p><button onclick="loadToolbox()">Refresh</button></p><table><thead><tr><th>ID</th><th>Engineer</th><th>Test</th><th>Status</th></tr></thead><tbody id="tbRows"></tbody></table>');const j=await api('/api/toolbox-test?role='+user.role+'&engineer='+encodeURIComponent(user.name));$('tbRows').innerHTML=(j.results||[]).map(r=>'<tr><td>'+r.id+'</td><td>'+safe(r.engineer_name)+'</td><td>'+safe(r.test_type)+'</td><td>'+safe(r.status)+'</td></tr>').join('')}
async function loadTightness(){setHtml('tightness','<h2>Tightness Test Centre</h2><p><button onclick="openTightnessCalculator()">Open Calculator</button><button onclick="loadTightnessRecords()">Refresh Records</button></p><iframe id="ttFrame"></iframe><table><thead><tr><th>ID</th><th>Date</th><th>Engineer</th><th>Site</th><th>Volume</th><th>Result</th></tr></thead><tbody id="ttRows"></tbody></table>');openTightnessCalculator();loadTightnessRecords()}
function openTightnessCalculator(){const f=$('ttFrame');if(!CALC_B64){f.srcdoc='<h2>Tightness calculator source missing</h2>';return}const bin=atob(CALC_B64);let bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);f.srcdoc=new TextDecoder().decode(bytes)}
async function loadTightnessRecords(){const j=await api('/api/tightness?role='+user.role+'&engineer='+encodeURIComponent(user.name));$('ttRows').innerHTML=(j.records||[]).map(r=>'<tr><td>'+r.id+'</td><td>'+safe(r.test_date)+'</td><td>'+safe(r.engineer_name)+'</td><td>'+safe(r.site_name)+'</td><td>'+safe(r.installation_volume)+'</td><td>'+safe(r.outcome)+'</td></tr>').join('')}
async function loadKnowledge(){setHtml('knowledge','<h2>Knowledge Centre</h2><div class="toolbar">'+MANUFACTURERS.map(m=>'<button class="secondary" onclick="kcSearch(\''+m+'\')">'+m+'</button>').join('')+'</div><div class="grid"><label>Search<br><input id="kcSearch"></label><label>Category<br><select id="kcFilter"><option value="">All Categories</option><option>IGEM Standards</option><option>Manufacturer Manuals</option><option>Gas Safe Guidance</option><option>Gas Installer Magazine</option></select></label></div><p><button onclick="loadKnowledgeRows()">Search</button></p><table><thead><tr><th>Title</th><th>Category</th><th>Reference</th><th>Keywords</th><th>Action</th></tr></thead><tbody id="kcRows"></tbody></table><p id="kcMsg" class="muted"></p>');loadKnowledgeRows()}
function kcSearch(t){$('kcSearch').value=t;$('kcFilter').value='Manufacturer Manuals';loadKnowledgeRows()}
async function loadKnowledgeRows(){const j=await api('/api/library?q='+encodeURIComponent($('kcSearch').value)+'&category='+encodeURIComponent($('kcFilter').value));$('kcMsg').textContent=(j.documents||[]).length+' document(s) found';$('kcRows').innerHTML=(j.documents||[]).map(d=>'<tr><td>'+safe(d.title)+'</td><td>'+safe(d.category)+'</td><td>'+safe(d.reference)+'</td><td>'+safe(d.keywords)+'</td><td><button onclick="openDoc('+d.id+')">Open</button></td></tr>').join('')}
async function openDoc(id){const j=await api('/api/library?id='+id);if(j.document&&j.document.file_url)window.open(j.document.file_url,'_blank')}
async function loadUsers(){setHtml('users','<h2>Users</h2><table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>PIN</th></tr></thead><tbody id="userRows"></tbody></table>');const j=await api('/api/users');$('userRows').innerHTML=(j.users||[]).map(u=>'<tr><td>'+safe(u.name)+'</td><td>'+safe(u.email)+'</td><td>'+safe(u.role)+'</td><td>'+safe(u.pin)+'</td></tr>').join('')}
async function loadRecords(){setHtml('records','<h2>Record Management</h2><p>Manager delete functions can be restored after access is stable.</p>')}
</script>
